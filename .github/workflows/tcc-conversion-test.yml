name: TCC Conversion Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GODOT_VERSION: 4.7.1-stable
  GODOT_ARCHIVE: Godot_v4.7.1-stable_linux.x86_64.zip
  GODOT_BINARY: Godot_v4.7.1-stable_linux.x86_64
  GODOT_ARCHIVE_SHA256: c7ff14fd28472c8d4f193043de30278dcf7e5241a1dcf7566b02e27addaa33ba
  SIMPLE_TOPDOWN_REF: 2413d7714b0dbd5d548058ea4c74f591f0d4e1e3
  TCC_REF: 4b6e942caca4d58af49dc006a037404d2f2a348c
  MONOPHOBIA_REF: b79cc26f2d3d01823d7e6359ee116322840f97a2
  SNAP_REF: b4191e195c7c84359f995d568d8906c452b83e50
  ADDING_REF: 1bf032618be258242f78505de7cd151242452776

jobs:
  tcc-conversion:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      PIP_CONFIG_FILE: /dev/null

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12.13'
          architecture: x64

      - name: Install and verify test dependencies
        run: |
          venv_dir="$RUNNER_TEMP/gm2godot-tcc-conversion-venv"
          if [ -e "$venv_dir" ] || [ -L "$venv_dir" ]; then
            echo "::error::Refusing to reuse dependency environment: $venv_dir" >&2
            exit 1
          fi
          python -m venv "$venv_dir"
          venv_bin="$venv_dir/bin"
          printf 'VIRTUAL_ENV=%s\n' "$venv_dir" >> "$GITHUB_ENV"
          printf '%s\n' "$venv_bin" >> "$GITHUB_PATH"
          export VIRTUAL_ENV="$venv_dir"
          export PATH="$venv_bin:$PATH"
          hash -r
          python -c 'import os, pathlib, sys; raise SystemExit(0 if pathlib.Path(sys.prefix).resolve() == pathlib.Path(os.environ["VIRTUAL_ENV"]).resolve() else 1)'
          python -m pip --isolated --disable-pip-version-check --no-input install --no-cache-dir --only-binary=:all: \
            --constraint constraints/requirements-linux-py312.txt \
            pip==26.1.2
          python -m pip --isolated --disable-pip-version-check --no-input install --no-cache-dir --only-binary=:all: \
            --constraint constraints/requirements-linux-py312.txt \
            Pillow==12.3.0
          python scripts/verify_dependency_environment.py \
            --constraint constraints/requirements-linux-py312.txt \
            --mode subset \
            --require pip \
            --require Pillow \
            --expected-python 3.12.13 \
            --expected-platform linux \
            --expected-machine x86_64 \
            --expected-pip 26.1.2 \
            --output "$RUNNER_TEMP/tcc-conversion-dependencies.json"

      - name: Cache pinned Godot
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cache/gm2godot/godot-${{ env.GODOT_VERSION }}
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{ env.GODOT_ARCHIVE_SHA256 }}

      - name: Install pinned Godot
        run: |
          set -euo pipefail
          godot_dir="$HOME/.cache/gm2godot/godot-${GODOT_VERSION}"
          godot_bin="${godot_dir}/${GODOT_BINARY}"
          if [ ! -x "$godot_bin" ]; then
            mkdir -p "$godot_dir"
            curl --fail --location --retry 3 \
              "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ARCHIVE}" \
              --output "${RUNNER_TEMP}/${GODOT_ARCHIVE}"
            echo "${GODOT_ARCHIVE_SHA256}  ${RUNNER_TEMP}/${GODOT_ARCHIVE}" | sha256sum --check --strict
            unzip -q "${RUNNER_TEMP}/${GODOT_ARCHIVE}" -d "$godot_dir"
            chmod +x "$godot_bin"
          fi
          echo "GODOT_BIN=$godot_bin" >> "$GITHUB_ENV"
          "$godot_bin" --version

      - name: Checkout pinned SimpleTopDown test game
        run: |
          set -euo pipefail
          repo_dir="${{ runner.temp }}/GM2GodotGameTest_SimpleTopDown"
          git init --quiet "$repo_dir"
          git -C "$repo_dir" remote add origin https://github.com/Infiland/GM2GodotGameTest_SimpleTopDown.git
          git -C "$repo_dir" fetch --quiet --depth 1 --no-tags origin "${SIMPLE_TOPDOWN_REF}"
          git -C "$repo_dir" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$repo_dir" rev-parse HEAD)" = "${SIMPLE_TOPDOWN_REF}"

      - name: Run SimpleTopDown conversion and boot-log test
        env:
          SIMPLE_TOPDOWN_PROJECT_PATH: ${{ runner.temp }}/GM2GodotGameTest_SimpleTopDown
        run: python -m unittest tests.test_simple_topdown_conversion -v

      - name: Checkout pinned The Colorful Creature
        run: |
          set -euo pipefail
          repo_dir="${{ runner.temp }}/TheColorfulCreature"
          git init --quiet "$repo_dir"
          git -C "$repo_dir" remote add origin https://github.com/Infiland/TheColorfulCreature.git
          git -C "$repo_dir" fetch --quiet --depth 1 --no-tags origin "${TCC_REF}"
          git -C "$repo_dir" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$repo_dir" rev-parse HEAD)" = "${TCC_REF}"

      - name: Run TCC conversion test
        env:
          TCC_PROJECT_PATH: ${{ runner.temp }}/TheColorfulCreature
        run: python -m unittest tests.test_tcc_conversion -v

      - name: Checkout pinned Monophobia
        run: |
          set -euo pipefail
          repo_dir="${{ runner.temp }}/Monophobia"
          git init --quiet "$repo_dir"
          git -C "$repo_dir" remote add origin https://github.com/Infiland/Monophobia.git
          git -C "$repo_dir" fetch --quiet --depth 1 --no-tags origin "${MONOPHOBIA_REF}"
          git -C "$repo_dir" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$repo_dir" rev-parse HEAD)" = "${MONOPHOBIA_REF}"

      - name: Run Monophobia conversion and boot-log test
        env:
          MONOPHOBIA_PROJECT_PATH: ${{ runner.temp }}/Monophobia
        run: python -m unittest tests.test_monophobia_conversion -v

  lts-2026-conversion:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PIP_CONFIG_FILE: /dev/null

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12.13'
          architecture: x64

      - name: Install and verify test dependencies
        run: |
          venv_dir="$RUNNER_TEMP/gm2godot-lts-2026-conversion-venv"
          if [ -e "$venv_dir" ] || [ -L "$venv_dir" ]; then
            echo "::error::Refusing to reuse dependency environment: $venv_dir" >&2
            exit 1
          fi
          python -m venv "$venv_dir"
          venv_bin="$venv_dir/bin"
          printf 'VIRTUAL_ENV=%s\n' "$venv_dir" >> "$GITHUB_ENV"
          printf '%s\n' "$venv_bin" >> "$GITHUB_PATH"
          export VIRTUAL_ENV="$venv_dir"
          export PATH="$venv_bin:$PATH"
          hash -r
          python -c 'import os, pathlib, sys; raise SystemExit(0 if pathlib.Path(sys.prefix).resolve() == pathlib.Path(os.environ["VIRTUAL_ENV"]).resolve() else 1)'
          python -m pip --isolated --disable-pip-version-check --no-input install --no-cache-dir --only-binary=:all: \
            --constraint constraints/requirements-linux-py312.txt \
            pip==26.1.2
          python -m pip --isolated --disable-pip-version-check --no-input install --no-cache-dir --only-binary=:all: \
            --constraint constraints/requirements-linux-py312.txt \
            Pillow==12.3.0
          python scripts/verify_dependency_environment.py \
            --constraint constraints/requirements-linux-py312.txt \
            --mode subset \
            --require pip \
            --require Pillow \
            --expected-python 3.12.13 \
            --expected-platform linux \
            --expected-machine x86_64 \
            --expected-pip 26.1.2 \
            --output "$RUNNER_TEMP/lts-2026-conversion-dependencies.json"

      - name: Cache pinned Godot
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cache/gm2godot/godot-${{ env.GODOT_VERSION }}
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{ env.GODOT_ARCHIVE_SHA256 }}

      - name: Install pinned Godot
        run: |
          set -euo pipefail
          godot_dir="$HOME/.cache/gm2godot/godot-${GODOT_VERSION}"
          godot_bin="${godot_dir}/${GODOT_BINARY}"
          if [ ! -x "$godot_bin" ]; then
            mkdir -p "$godot_dir"
            curl --fail --location --retry 3 \
              "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ARCHIVE}" \
              --output "${RUNNER_TEMP}/${GODOT_ARCHIVE}"
            echo "${GODOT_ARCHIVE_SHA256}  ${RUNNER_TEMP}/${GODOT_ARCHIVE}" | sha256sum --check --strict
            unzip -q "${RUNNER_TEMP}/${GODOT_ARCHIVE}" -d "$godot_dir"
            chmod +x "$godot_bin"
          fi
          echo "GODOT_BIN=$godot_bin" >> "$GITHUB_ENV"
          godot_build="$("$godot_bin" --version)"
          test "$godot_build" = "4.7.1.stable.official.a13da4feb"

      - name: Checkout pinned SNAP
        run: |
          set -euo pipefail
          repo_dir="${{ runner.temp }}/SNAP"
          git init --quiet "$repo_dir"
          git -C "$repo_dir" remote add origin https://github.com/JujuAdams/SNAP.git
          git -C "$repo_dir" fetch --quiet --depth 1 --no-tags origin "${SNAP_REF}"
          git -C "$repo_dir" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$repo_dir" rev-parse HEAD)" = "${SNAP_REF}"
          test -f "$repo_dir/snap.yyp"

      - name: Checkout pinned Adding
        run: |
          set -euo pipefail
          repo_dir="${{ runner.temp }}/Adding"
          git init --quiet "$repo_dir"
          git -C "$repo_dir" remote add origin https://github.com/WuffMakesGames/Adding.git
          git -C "$repo_dir" fetch --quiet --depth 1 --no-tags origin "${ADDING_REF}"
          git -C "$repo_dir" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$repo_dir" rev-parse HEAD)" = "${ADDING_REF}"
          test -f "$repo_dir/Adding.yyp"

      - name: Prepare bounded report directory
        run: |
          output_root="${RUNNER_TEMP}/gm2godot-lts-2026-output"
          mkdir -p "$output_root"
          echo "LTS_FIXTURE_OUTPUT_ROOT=$output_root" >> "$GITHUB_ENV"

      - name: Run current-LTS conversion, validation, and boot tests
        timeout-minutes: 15
        env:
          SNAP_PROJECT_PATH: ${{ runner.temp }}/SNAP
          ADDING_PROJECT_PATH: ${{ runner.temp }}/Adding
          GM2GODOT_REQUIRE_LTS_FIXTURES: '1'
        run: |
          set -o pipefail
          python -m unittest tests.test_lts_2026_conversion -v 2>&1 \
            | tee "$LTS_FIXTURE_OUTPUT_ROOT/unittest.log"

      - name: Upload bounded current-LTS failure reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lts-2026-fixture-reports
          path: |
            ${{ runner.temp }}/gm2godot-lts-2026-output/lts_fixture_report.json
            ${{ runner.temp }}/gm2godot-lts-2026-output/unittest.log
            ${{ runner.temp }}/gm2godot-lts-2026-output/*/gm2godot/conversion_diagnostics.json
            ${{ runner.temp }}/gm2godot-lts-2026-output/*/gm2godot/conversion_diagnostics.md
            ${{ runner.temp }}/gm2godot-lts-2026-output/*/gm2godot/conversion_attempt.json
            ${{ runner.temp }}/gm2godot-lts-2026-output/*/gm2godot/conversion_manifest.json
            ${{ runner.temp }}/gm2godot-lts-2026-output/*/gm2godot/godot_validation_report.json
          archive: true
          if-no-files-found: ignore
          retention-days: 7
