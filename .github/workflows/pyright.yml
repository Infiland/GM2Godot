name: Pyright

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow pyright

      - name: Run pyright
        run: pyright --warnings
