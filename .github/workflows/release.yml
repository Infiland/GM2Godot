name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'src/version.py'
  push:
    branches: [main]
    paths:
      - 'src/version.py'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "exec(open('src/version.py').read()); print(VERSION)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          set -euo pipefail
          tag_ref="refs/tags/v${{ steps.version.outputs.version }}"
          ls_remote_status=0
          git ls-remote --exit-code --refs origin "$tag_ref" >/dev/null || ls_remote_status=$?

          case "$ls_remote_status" in
            0)
              exists=true
              ;;
            2)
              exists=false
              ;;
            *)
              echo "::error::Failed to query exact remote tag $tag_ref (git ls-remote exit $ls_remote_status)." >&2
              exit "$ls_remote_status"
              ;;
          esac

          echo "exists=$exists" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: .exe
            pyinstaller_mode: --onefile
          - os: macos-latest
            name: macos
            ext: ""
            pyinstaller_mode: --onedir
          - os: ubuntu-latest
            name: linux
            ext: ""
            pyinstaller_mode: --onefile
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller ${{ matrix.pyinstaller_mode }} \
            --windowed \
            --clean \
            --name GM2Godot \
            --icon img/Logo.png \
            --hidden-import markdown2 \
            --hidden-import PIL \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --add-data "img${SEP}img" \
            --add-data "src${SEP}src" \
            --add-data "Languages${SEP}Languages" \
            --add-data "Current Language${SEP}." \
            main.py

      - name: Package build
        run: |
          mkdir -p release
          if [ "${{ matrix.name }}" = "macos" ]; then
            cp -R dist/GM2Godot.app release/
          else
            cp dist/GM2Godot${{ matrix.ext }} release/
          fi
          cp README.md release/

      - name: Zip release
        run: |
          cd release
          7z a ../GM2Godot-${{ matrix.name }}.zip .

      - name: Create macOS DMG
        if: matrix.name == 'macos'
        run: |
          rm -rf dmg
          mkdir -p dmg
          cp -R dist/GM2Godot.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create \
            -volname "GM2Godot" \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            GM2Godot-macos.dmg

      - name: Upload artifact
        if: matrix.name != 'macos'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: GM2Godot-${{ matrix.name }}
          path: GM2Godot-${{ matrix.name }}.zip

      - name: Upload macOS artifacts
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: GM2Godot-${{ matrix.name }}
          path: |
            GM2Godot-${{ matrix.name }}.zip
            GM2Godot-${{ matrix.name }}.dmg

  release:
    needs: [get-version, build]
    if: github.event_name != 'pull_request' && needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download verified artifact archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: raw-artifacts
          skip-decompress: true
          digest-mismatch: error

      - name: Extract verified artifact archives
        run: |
          set -euo pipefail
          mkdir -p artifacts
          for name in GM2Godot-windows GM2Godot-macos GM2Godot-linux; do
            archive="raw-artifacts/$name/$name.zip"
            if [[ ! -s "$archive" ]]; then
              echo "::error::Missing or empty verified archive: $archive" >&2
              exit 1
            fi
            mkdir -p "artifacts/$name"
            unzip -q "$archive" -d "artifacts/$name"
          done

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: GM2Godot v${{ needs.get-version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/GM2Godot-windows/GM2Godot-windows.zip
            artifacts/GM2Godot-macos/GM2Godot-macos.zip
            artifacts/GM2Godot-macos/GM2Godot-macos.dmg
            artifacts/GM2Godot-linux/GM2Godot-linux.zip
