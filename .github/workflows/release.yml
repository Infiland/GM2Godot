name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'src/version.py'
  push:
    branches: [main]
    paths:
      - 'src/version.py'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "exec(open('src/version.py').read()); print(VERSION)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: .exe
          - os: macos-latest
            name: macos
            ext: ""
          - os: ubuntu-latest
            name: linux
            ext: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --onefile \
            --windowed \
            --clean \
            --name GM2Godot \
            --icon img/Logo.png \
            --hidden-import markdown2 \
            --hidden-import PIL \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --add-data "img${SEP}img" \
            --add-data "src${SEP}src" \
            --add-data "Languages${SEP}Languages" \
            --add-data "Current Language${SEP}." \
            main.py

      - name: Package build
        run: |
          mkdir -p release
          cp dist/GM2Godot${{ matrix.ext }} release/
          cp README.md release/

      - name: Zip release
        run: |
          cd release
          7z a ../GM2Godot-${{ matrix.name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GM2Godot-${{ matrix.name }}
          path: GM2Godot-${{ matrix.name }}.zip

  release:
    needs: [get-version, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: GM2Godot v${{ needs.get-version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/GM2Godot-windows/GM2Godot-windows.zip
            artifacts/GM2Godot-macos/GM2Godot-macos.zip
            artifacts/GM2Godot-linux/GM2Godot-linux.zip
