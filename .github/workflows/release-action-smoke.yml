name: Release Action Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release.yml'
      - '.github/workflows/release-action-smoke.yml'
      - 'scripts/release_publisher.py'

permissions: {}

jobs:
  upload-sentinel:
    name: Upload deterministic sentinel
    runs-on: ubuntu-latest
    outputs:
      artifact_digest: ${{ steps.upload_sentinel.outputs['artifact-digest'] }}
    steps:
      - name: Create sentinel
        run: |
          set -euo pipefail
          mkdir -p sentinel
          printf 'GM2Godot release action smoke\n' \
            > sentinel/release-action-sentinel.txt

      - name: Upload sentinel
        id: upload_sentinel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-action-smoke
          path: sentinel/release-action-sentinel.txt
          archive: true
          if-no-files-found: error
          retention-days: 1

  verify-sentinel:
    name: Download and verify sentinel
    needs: upload-sentinel
    runs-on: ubuntu-latest
    steps:
      - name: Download verified sentinel archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-action-smoke
          path: raw-artifacts/release-action-smoke
          skip-decompress: true
          digest-mismatch: error

      - name: Verify sentinel archive and bytes
        env:
          EXPECTED_ARCHIVE_SHA256: ${{ needs.upload-sentinel.outputs.artifact_digest }}
        run: |
          set -euo pipefail

          archive=raw-artifacts/release-action-smoke/release-action-smoke.zip
          if [[ ! -s "$archive" ]]; then
            echo "::error::Missing or empty sentinel archive: $archive" >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_ARCHIVE_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Upload action returned an invalid artifact digest." >&2
            exit 1
          fi

          actual_archive_sha256="$(sha256sum "$archive")"
          actual_archive_sha256="${actual_archive_sha256%% *}"
          if [[ "$actual_archive_sha256" != "$EXPECTED_ARCHIVE_SHA256" ]]; then
            echo "::error::Downloaded archive differs from the uploaded artifact." >&2
            exit 1
          fi

          archive_entries="$(unzip -Z1 "$archive")"
          if [[ "$archive_entries" != "release-action-sentinel.txt" ]]; then
            echo "::error::Unexpected sentinel archive layout: $archive_entries" >&2
            exit 1
          fi

          unzip -p "$archive" release-action-sentinel.txt \
            > release-action-sentinel.txt
          printf '%s  %s\n' \
            f1efea0ac477ea11ec0fe4d13d9bfdcc2908ed8a6e2c71b91952388c1aaf48e6 \
            release-action-sentinel.txt \
            | sha256sum --check --strict -
          if ! cmp -s \
            <(printf 'GM2Godot release action smoke\n') \
            release-action-sentinel.txt; then
            echo "::error::Sentinel bytes changed during the artifact round-trip." >&2
            exit 1
          fi

  publisher-startup:
    name: publisher-startup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Reject invalid local assets before GitHub API access
        env:
          SMOKE_TARGET_SHA: ${{ github.sha }}
          SMOKE_ASSET_ROOT: __gm2godot_release_smoke_missing__/${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          set +e
          publisher_output="$(
            python3 - <<'PY' 2>&1
          import os
          from scripts import release_publisher

          synthetic_environment = dict(os.environ)
          synthetic_environment.update(
              {
                  "GITHUB_API_URL": "https://api.github.com",
                  "GITHUB_EVENT_NAME": "push",
                  "GITHUB_REF": "refs/heads/main",
                  "GITHUB_REF_TYPE": "branch",
                  "GITHUB_REPOSITORY": os.environ["GITHUB_REPOSITORY"],
                  "GITHUB_RUN_ATTEMPT": os.environ["GITHUB_RUN_ATTEMPT"],
                  "GITHUB_RUN_ID": os.environ["GITHUB_RUN_ID"],
                  "GITHUB_SERVER_URL": "https://github.com",
                  "GITHUB_SHA": os.environ["SMOKE_TARGET_SHA"],
                  "GITHUB_TOKEN": "gm2godot-release-smoke-invalid-token",
                  "RELEASE_ASSET_ROOT": os.environ["SMOKE_ASSET_ROOT"],
                  "RELEASE_NAME": "GM2Godot v0.0.0",
                  "RELEASE_OWNERSHIP_RETRY_DELAY_SECONDS": "0",
                  "RELEASE_PREFLIGHT_RETRY_DELAY_SECONDS": "0",
                  "RELEASE_RECEIPT_PATH": "release-receipt/release-publisher.json",
                  "RELEASE_TAG": "v0.0.0",
                  "RELEASE_TARGET_SHA": os.environ["SMOKE_TARGET_SHA"],
              }
          )
          raise SystemExit(release_publisher.main(synthetic_environment))
          PY
          )"
          publisher_status=$?
          set -e
          if (( publisher_status == 0 )); then
            echo "::error::Publisher unexpectedly crossed its local rejection boundary." >&2
            exit 1
          fi
          if [[ "$publisher_output" != *"Cannot open regular release asset"* ]]; then
            echo "::error::Publisher did not emit the expected local asset diagnostic." >&2
            printf '%s\n' "$publisher_output" >&2
            exit 1
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          receipt = json.loads(
              Path("release-receipt/release-publisher.json").read_text(encoding="utf-8")
          )
          if receipt.get("stage") != "failed":
              raise SystemExit("publisher startup receipt did not record failure")
          failure = receipt.get("failure")
          if not isinstance(failure, dict) or failure.get("phase") != "seal-assets":
              raise SystemExit("publisher startup receipt recorded the wrong phase")
          if receipt.get("mutation_intents") != []:
              raise SystemExit("publisher attempted a mutation before local rejection")
          PY
