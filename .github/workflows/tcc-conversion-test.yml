name: TCC Conversion Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GODOT_VERSION: 4.4.1-stable
  GODOT_ARCHIVE: Godot_v4.4.1-stable_linux.x86_64.zip
  GODOT_BINARY: Godot_v4.4.1-stable_linux.x86_64

jobs:
  tcc-conversion:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install Pillow

      - name: Cache pinned Godot
        uses: actions/cache@v4
        with:
          path: ~/.cache/gm2godot/godot-${{ env.GODOT_VERSION }}
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - name: Install pinned Godot
        run: |
          set -euo pipefail
          godot_dir="$HOME/.cache/gm2godot/godot-${GODOT_VERSION}"
          godot_bin="${godot_dir}/${GODOT_BINARY}"
          if [ ! -x "$godot_bin" ]; then
            mkdir -p "$godot_dir"
            curl --fail --location --retry 3 \
              "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ARCHIVE}" \
              --output "${RUNNER_TEMP}/${GODOT_ARCHIVE}"
            unzip -q "${RUNNER_TEMP}/${GODOT_ARCHIVE}" -d "$godot_dir"
            chmod +x "$godot_bin"
          fi
          echo "GODOT_BIN=$godot_bin" >> "$GITHUB_ENV"
          "$godot_bin" --version

      - name: Clone SimpleTopDown test game (shallow)
        run: git clone --depth 1 --no-recurse-submodules https://github.com/Infiland/GM2GodotGameTest_SimpleTopDown.git "${{ runner.temp }}/GM2GodotGameTest_SimpleTopDown"

      - name: Run SimpleTopDown conversion and boot-log test
        env:
          SIMPLE_TOPDOWN_PROJECT_PATH: ${{ runner.temp }}/GM2GodotGameTest_SimpleTopDown
        run: python -m unittest tests.test_simple_topdown_conversion -v

      - name: Clone The Colorful Creature (shallow)
        run: git clone --depth 1 --no-recurse-submodules https://github.com/Infiland/TheColorfulCreature.git "${{ runner.temp }}/TheColorfulCreature"

      - name: Run TCC conversion test
        env:
          TCC_PROJECT_PATH: ${{ runner.temp }}/TheColorfulCreature
        run: python -m unittest tests.test_tcc_conversion -v

      - name: Clone Monophobia (shallow)
        run: git clone --depth 1 --no-recurse-submodules https://github.com/Infiland/Monophobia.git "${{ runner.temp }}/Monophobia"

      - name: Run Monophobia conversion and boot-log test
        env:
          MONOPHOBIA_PROJECT_PATH: ${{ runner.temp }}/Monophobia
        run: python -m unittest tests.test_monophobia_conversion -v
