name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libegl1

      - name: Run unit tests
        run: python -m unittest discover tests/ -v

  windows-artifact-transactions:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Run Windows outcome and artifact transaction tests
        run: >-
          python -m unittest -v
          tests.test_conversion_outcome
          tests.test_conversion_manifest
          tests.test_diagnostics
          tests.test_architecture_policy
          tests.test_converter
          tests.test_cli
          tests.test_asset_registry
          tests.test_included_files.TestIncludedFilesManagedRootTransaction
          tests.test_included_files.TestIncludedFilesConverterOutputContainment
