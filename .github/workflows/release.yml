name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'src/version.py'
  push:
    branches: [main]
    paths:
      - 'src/version.py'

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('gm2godot-release-pr-{0}', github.run_id) || 'gm2godot-release-publisher' }}
  cancel-in-progress: false

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "exec(open('src/version.py').read()); print(VERSION)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          set -euo pipefail
          tag_ref="refs/tags/v${{ steps.version.outputs.version }}"
          ls_remote_status=0
          git ls-remote --exit-code --refs origin "$tag_ref" >/dev/null || ls_remote_status=$?

          case "$ls_remote_status" in
            0)
              exists=true
              ;;
            2)
              exists=false
              ;;
            *)
              echo "::error::Failed to query exact remote tag $tag_ref (git ls-remote exit $ls_remote_status)." >&2
              exit "$ls_remote_status"
              ;;
          esac

          echo "exists=$exists" >> "$GITHUB_OUTPUT"

  existing-release-integrity:
    needs: get-version
    if: github.event_name != 'pull_request' && needs.get-version.outputs.tag_exists == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify existing tagged release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.get-version.outputs.version }}
        run: |
          set -euo pipefail

          for required in gh python sha256sum cmp; do
            if ! command -v "$required" >/dev/null 2>&1; then
              echo "::error::Required existing-release audit tool is unavailable: $required" >&2
              exit 1
            fi
          done
          if [[ -z "${GH_TOKEN:-}" || -z "${GITHUB_REPOSITORY:-}" || -z "${RELEASE_TAG:-}" ]]; then
            echo "::error::Existing-release audit is missing GH_TOKEN, GITHUB_REPOSITORY, or RELEASE_TAG." >&2
            exit 1
          fi

          umask 077
          audit_root="$(mktemp -d)"
          if [[ -z "$audit_root" || ! -d "$audit_root" || -L "$audit_root" ]]; then
            echo "::error::Unable to create a fresh existing-release audit directory." >&2
            exit 1
          fi
          cleanup() {
            find "$audit_root" -depth -delete
          }
          trap cleanup EXIT
          downloads="$audit_root/downloads"
          mkdir -- "$downloads"

          query_pages() {
            local endpoint="$1"
            local destination="$2"
            local description="$3"
            local api_status=0
            gh api --method GET --paginate --slurp \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "$endpoint" >"$destination" || api_status=$?
            if (( api_status != 0 )); then
              echo "::error::Authenticated ${description} query failed for ${RELEASE_TAG} (gh exit ${api_status})." >&2
              exit "$api_status"
            fi
          }

          query_object() {
            local endpoint="$1"
            local destination="$2"
            local description="$3"
            local api_status=0
            gh api --method GET \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "$endpoint" >"$destination" || api_status=$?
            if (( api_status != 0 )); then
              echo "::error::Authenticated ${description} query failed for ${RELEASE_TAG} (gh exit ${api_status})." >&2
              exit "$api_status"
            fi
          }

          select_release_id() {
            python - "$1" "$RELEASE_TAG" "$GITHUB_REPOSITORY" <<'PY'
          import json
          import sys

          path, exact_tag, repository = sys.argv[1:]
          try:
              with open(path, encoding="utf-8") as handle:
                  pages = json.load(handle)
          except (OSError, json.JSONDecodeError) as error:
              print(f"::error::Unable to parse release listing: {error}", file=sys.stderr)
              raise SystemExit(1)

          if not isinstance(pages, list):
              print("::error::Release listing was not a JSON array of pages.", file=sys.stderr)
              raise SystemExit(1)

          matches = []
          for page_number, page in enumerate(pages, start=1):
              if not isinstance(page, list):
                  print(
                      f"::error::Release page {page_number} was not a JSON array.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)
              for release in page:
                  if not isinstance(release, dict):
                      print(
                          f"::error::Release page {page_number} contained a non-object entry.",
                          file=sys.stderr,
                      )
                      raise SystemExit(1)
                  tag_name = release.get("tag_name")
                  if not isinstance(tag_name, str) or not tag_name:
                      print(
                          f"::error::Release page {page_number} contained an entry without "
                          "a non-empty string tag_name.",
                          file=sys.stderr,
                      )
                      raise SystemExit(1)
                  if tag_name == exact_tag:
                      matches.append(release)

          if len(matches) != 1:
              print(
                  f"::error::Expected exactly one release for {exact_tag}; found {len(matches)}.",
                  file=sys.stderr,
              )
              for release in matches:
                  print(
                      "matching release: "
                      f"id={release.get('id')!r} draft={release.get('draft')!r} "
                      f"prerelease={release.get('prerelease')!r} "
                      f"url={release.get('html_url')!r}",
                      file=sys.stderr,
                  )
              raise SystemExit(1)

          release_id = matches[0].get("id")
          release_url = matches[0].get("html_url")
          if type(release_id) is not int or release_id <= 0:
              print(
                  f"::error::Exact release for {exact_tag} has an invalid id: {release_id!r}.",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          expected_url = f"https://github.com/{repository}/releases/tag/{exact_tag}"
          if release_url != expected_url:
              print(
                  f"::error::Exact release for {exact_tag} has invalid URL "
                  f"{release_url!r}; expected {expected_url!r} (id={release_id}).",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          print(
              f"Existing release candidate: id={release_id} url={release_url}",
              file=sys.stderr,
          )
          print(release_id)
          PY
          }

          validate_snapshot() {
            python - "$1" "$2" "$3" "$RELEASE_TAG" "$GITHUB_REPOSITORY" "$4" "$5" <<'PY'
          import json
          import re
          import sys
          from datetime import datetime
          from pathlib import Path

          (
              release_path,
              assets_path,
              tag_path,
              exact_tag,
              repository,
              plan_path,
              receipt_path,
          ) = sys.argv[1:]
          expected_names = (
              "GM2Godot-linux.zip",
              "GM2Godot-macos.dmg",
              "GM2Godot-macos.zip",
              "GM2Godot-windows.zip",
              "SHA256SUMS",
          )
          digest_pattern = re.compile(r"sha256:[0-9a-f]{64}\Z")
          object_sha_pattern = re.compile(r"(?:[0-9a-f]{40}|[0-9a-f]{64})\Z")


          def fail(message: str) -> None:
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)


          def load_json(path: str, description: str):
              try:
                  with open(path, encoding="utf-8") as handle:
                      return json.load(handle)
              except (OSError, json.JSONDecodeError) as error:
                  fail(f"Unable to parse {description}: {error}")


          release_pages = load_json(release_path, "release listing")
          if not isinstance(release_pages, list):
              fail("Release listing was not a JSON array of pages.")
          matches = []
          for page_number, page in enumerate(release_pages, start=1):
              if not isinstance(page, list):
                  fail(f"Release page {page_number} was not a JSON array.")
              for release in page:
                  if not isinstance(release, dict):
                      fail(f"Release page {page_number} contained a non-object entry.")
                  tag_name = release.get("tag_name")
                  if not isinstance(tag_name, str) or not tag_name:
                      fail(
                          f"Release page {page_number} contained an entry without "
                          "a non-empty string tag_name."
                      )
                  if tag_name == exact_tag:
                      matches.append(release)
          if len(matches) != 1:
              fail(f"Expected exactly one release for {exact_tag}; found {len(matches)}.")

          release = matches[0]
          release_id = release.get("id")
          release_url = release.get("html_url")
          diagnostic = f"id={release_id!r} url={release_url!r}"
          if type(release_id) is not int or release_id <= 0:
              fail(f"Exact release for {exact_tag} has an invalid id ({diagnostic}).")
          expected_release_url = (
              f"https://github.com/{repository}/releases/tag/{exact_tag}"
          )
          if release_url != expected_release_url:
              fail(
                  f"Exact release for {exact_tag} has an invalid URL; expected "
                  f"{expected_release_url!r} ({diagnostic})."
              )
          if release.get("draft") is not False:
              fail(f"Exact release for {exact_tag} is draft ({diagnostic}).")
          if release.get("prerelease") is not False:
              fail(f"Exact release for {exact_tag} is a prerelease ({diagnostic}).")
          published_at = release.get("published_at")
          if not isinstance(published_at, str) or not published_at:
              fail(f"Exact release for {exact_tag} is not published ({diagnostic}).")
          try:
              published_timestamp = datetime.fromisoformat(
                  published_at[:-1] + "+00:00" if published_at.endswith("Z") else published_at
              )
          except ValueError:
              fail(
                  f"Exact release for {exact_tag} has malformed published_at "
                  f"{published_at!r} ({diagnostic})."
              )
          if published_timestamp.tzinfo is None:
              fail(
                  f"Exact release for {exact_tag} has a timezone-free published_at "
                  f"({diagnostic})."
              )

          asset_pages = load_json(assets_path, "release asset listing")
          if not isinstance(asset_pages, list):
              fail(
                  "Release asset listing was not a JSON array of pages "
                  f"({diagnostic})."
              )
          assets = []
          for page_number, page in enumerate(asset_pages, start=1):
              if not isinstance(page, list):
                  fail(
                      f"Release asset page {page_number} was not a JSON array "
                      f"({diagnostic})."
                  )
              for asset in page:
                  if not isinstance(asset, dict):
                      fail(
                          f"Release asset page {page_number} contained a non-object "
                          f"entry ({diagnostic})."
                      )
                  assets.append(asset)

          names = [asset.get("name") for asset in assets]
          if len(assets) != len(expected_names) or sorted(names, key=repr) != sorted(
              expected_names
          ):
              fail(
                  f"Exact release has invalid asset inventory: {names!r}; expected "
                  f"exactly {list(expected_names)!r} ({diagnostic})."
              )

          normalized_assets = []
          seen_ids = set()
          for expected_name in expected_names:
              matching_assets = [
                  asset for asset in assets if asset.get("name") == expected_name
              ]
              if len(matching_assets) != 1:
                  fail(
                      f"Release {release_id} has {len(matching_assets)} assets named "
                      f"{expected_name!r}; expected one."
                  )
              asset = matching_assets[0]
              asset_id = asset.get("id")
              state = asset.get("state")
              size = asset.get("size")
              digest = asset.get("digest")
              asset_diagnostic = (
                  f"release_id={release_id} release_url={release_url!r} "
                  f"asset={expected_name!r} id={asset_id!r}"
              )
              if type(asset_id) is not int or asset_id <= 0:
                  fail(f"Invalid asset id ({asset_diagnostic}).")
              if asset_id in seen_ids:
                  fail(f"Duplicate asset id ({asset_diagnostic}).")
              seen_ids.add(asset_id)
              if state != "uploaded":
                  fail(f"Asset is not uploaded: state={state!r} ({asset_diagnostic}).")
              if type(size) is not int or size <= 0:
                  fail(f"Asset is empty or has invalid size={size!r} ({asset_diagnostic}).")
              if not isinstance(digest, str) or not digest_pattern.fullmatch(digest):
                  fail(f"Asset has an invalid SHA-256 digest={digest!r} ({asset_diagnostic}).")
              normalized_assets.append(
                  {
                      "digest": digest,
                      "id": asset_id,
                      "name": expected_name,
                      "size": size,
                      "state": state,
                  }
              )

          tag_ref = load_json(tag_path, "exact tag reference")
          if not isinstance(tag_ref, dict):
              fail("Exact tag response was not a JSON object.")
          if tag_ref.get("ref") != f"refs/tags/{exact_tag}":
              fail(
                  f"Exact tag response had invalid ref={tag_ref.get('ref')!r}; "
                  f"expected refs/tags/{exact_tag}."
              )
          tag_object = tag_ref.get("object")
          if not isinstance(tag_object, dict):
              fail("Exact tag response did not contain an object receipt.")
          object_type = tag_object.get("type")
          object_sha = tag_object.get("sha")
          if object_type not in {"commit", "tag"}:
              fail(f"Exact tag response had invalid object type={object_type!r}.")
          if not isinstance(object_sha, str) or not object_sha_pattern.fullmatch(
              object_sha
          ):
              fail(f"Exact tag response had invalid object sha={object_sha!r}.")

          receipt = {
              "assets": normalized_assets,
              "release": {
                  "draft": False,
                  "html_url": release_url,
                  "id": release_id,
                  "prerelease": False,
                  "published_at": published_at,
                  "tag_name": exact_tag,
              },
              "tag_ref": {
                  "object_sha": object_sha,
                  "object_type": object_type,
                  "ref": f"refs/tags/{exact_tag}",
              },
          }
          Path(plan_path).write_text(
              "".join(
                  f"{release_id}\t{release_url}\t{asset['id']}\t{asset['name']}\t"
                  f"{asset['size']}\t{asset['digest']}\n"
                  for asset in normalized_assets
              ),
              encoding="utf-8",
          )
          Path(receipt_path).write_text(
              json.dumps(receipt, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          print(
              f"Existing release snapshot: id={release_id} url={release_url} "
              f"assets={len(normalized_assets)} tag_object={object_type}:{object_sha}"
          )
          PY
          }

          capture_snapshot() {
            local snapshot_name="$1"
            local release_pages="$audit_root/${snapshot_name}-releases.json"
            local asset_pages="$audit_root/${snapshot_name}-assets.json"
            local tag_response="$audit_root/${snapshot_name}-tag.json"
            local plan="$audit_root/${snapshot_name}-assets.tsv"
            local receipt="$audit_root/${snapshot_name}-receipt.json"
            local release_id

            query_pages \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              "$release_pages" \
              "release-list"
            if ! release_id="$(select_release_id "$release_pages")"; then
              echo "::error::Release listing could not identify one exact release for ${RELEASE_TAG}." >&2
              exit 1
            fi
            query_pages \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
              "$asset_pages" \
              "release-asset"
            query_object \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
              "$tag_response" \
              "tag-ref"
            validate_snapshot \
              "$release_pages" \
              "$asset_pages" \
              "$tag_response" \
              "$plan" \
              "$receipt"
          }

          capture_snapshot initial
          initial_plan="$audit_root/initial-assets.tsv"
          audit_release_id=""
          audit_release_url=""
          while IFS=$'\t' read -r release_id release_url asset_id asset_name expected_size expected_digest; do
            if [[ -z "$audit_release_id" ]]; then
              audit_release_id="$release_id"
              audit_release_url="$release_url"
            elif [[ "$audit_release_id" != "$release_id" || "$audit_release_url" != "$release_url" ]]; then
              echo "::error::Existing-release download plan contains inconsistent release identities." >&2
              exit 1
            fi
            destination="$downloads/$asset_name"
            if [[ -e "$destination" || -L "$destination" ]]; then
              echo "::error::Existing-release download path already exists: asset=${asset_name} release_id=${release_id} release_url=${release_url}" >&2
              exit 1
            fi
            download_status=0
            gh api --method GET \
              -H 'Accept: application/octet-stream' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
              >"$destination" || download_status=$?
            if (( download_status != 0 )); then
              echo "::error::Failed to download existing release asset=${asset_name} id=${asset_id} release_id=${release_id} release_url=${release_url} (gh exit ${download_status})." >&2
              exit "$download_status"
            fi
            if [[ ! -f "$destination" || -L "$destination" ]]; then
              echo "::error::Downloaded asset is not a direct regular file: asset=${asset_name} release_id=${release_id} release_url=${release_url}" >&2
              exit 1
            fi
          done < "$initial_plan"
          if [[ -z "$audit_release_id" || -z "$audit_release_url" ]]; then
            echo "::error::Existing-release download plan did not contain a release identity." >&2
            exit 1
          fi

          python - "$initial_plan" "$downloads" <<'PY'
          import hashlib
          import os
          import re
          import stat
          import sys
          from pathlib import Path

          plan_path = Path(sys.argv[1])
          downloads = Path(sys.argv[2])
          payload_names = (
              "GM2Godot-linux.zip",
              "GM2Godot-macos.dmg",
              "GM2Godot-macos.zip",
              "GM2Godot-windows.zip",
          )
          expected_names = payload_names + ("SHA256SUMS",)
          manifest_pattern = re.compile(
              rb"([0-9a-f]{64})  (GM2Godot-(?:linux|macos|windows)\.(?:zip|dmg))\n"
          )


          def fail(message: str) -> None:
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)


          metadata = {}
          release_identity = None
          try:
              plan_lines = plan_path.read_text(encoding="utf-8").splitlines()
          except OSError as error:
              fail(f"Unable to read asset audit plan: {error}")
          for line in plan_lines:
              fields = line.split("\t")
              if len(fields) != 6:
                  fail("Asset audit plan contained a malformed record.")
              release_id, release_url, asset_id, name, size_text, digest = fields
              current_identity = (release_id, release_url)
              if release_identity is None:
                  release_identity = current_identity
              elif release_identity != current_identity:
                  fail("Asset audit plan contained inconsistent release identities.")
              if name in metadata:
                  fail(f"Asset audit plan repeated {name!r}.")
              try:
                  size = int(size_text)
              except ValueError:
                  fail(f"Asset audit plan had invalid size for {name!r}.")
              metadata[name] = (asset_id, size, digest)
          if tuple(metadata) != expected_names:
              fail(f"Asset audit plan had unexpected inventory: {list(metadata)!r}.")
          if release_identity is None:
              fail("Asset audit plan did not contain a release identity.")
          release_id, release_url = release_identity
          failure_context = (
              f"release_id={release_id} release_url={release_url}"
          )


          def fail_asset(message: str) -> None:
              fail(f"{message} ({failure_context}).")

          local_digests = {}
          for name in expected_names:
              path = downloads / name
              try:
                  if path.is_symlink():
                      fail_asset(
                          f"Downloaded asset is not a direct regular file: {name!r}"
                      )
                  with path.open("rb") as handle:
                      file_stat = os.fstat(handle.fileno())
                      if not stat.S_ISREG(file_stat.st_mode):
                          fail_asset(
                              f"Downloaded asset is not a direct regular file: {name!r}"
                          )
                      _, expected_size, expected_digest = metadata[name]
                      if file_stat.st_size != expected_size:
                          fail_asset(
                              f"Downloaded asset size mismatch for {name!r}: "
                              f"API={expected_size} local={file_stat.st_size}"
                          )
                      local_digest = hashlib.file_digest(handle, "sha256").hexdigest()
              except OSError as error:
                  fail_asset(f"Unable to read downloaded asset {name!r}: {error}")
              if f"sha256:{local_digest}" != expected_digest:
                  fail_asset(
                      f"Downloaded asset digest mismatch for {name!r}: "
                      f"API={expected_digest} local=sha256:{local_digest}"
                  )
              local_digests[name] = local_digest

          try:
              manifest = (downloads / "SHA256SUMS").read_bytes()
          except OSError as error:
              fail_asset(f"Unable to parse SHA256SUMS: {error}")
          matches = []
          offset = 0
          while offset < len(manifest):
              match = manifest_pattern.match(manifest, offset)
              if match is None:
                  fail_asset(f"SHA256SUMS is not canonical at byte offset {offset}")
              matches.append(
                  (match.group(2).decode("ascii"), match.group(1).decode("ascii"))
              )
              offset = match.end()
          if tuple(name for name, _ in matches) != payload_names:
              fail_asset(
                  "SHA256SUMS must contain exactly the four payloads in canonical "
                  f"order; found {[name for name, _ in matches]!r}"
              )
          for name, manifest_digest in matches:
              api_digest = metadata[name][2].removeprefix("sha256:")
              if manifest_digest != api_digest or manifest_digest != local_digests[name]:
                  fail_asset(
                      f"SHA256SUMS digest mismatch for {name!r}: "
                      f"manifest={manifest_digest} API={api_digest} "
                      f"local={local_digests[name]}"
                  )
          PY

          checksum_status=0
          (
            cd "$downloads"
            sha256sum --check --strict SHA256SUMS
          ) || checksum_status=$?
          if (( checksum_status != 0 )); then
            echo "::error::Strict SHA256SUMS verification failed for release_id=${audit_release_id} release_url=${audit_release_url} (sha256sum exit ${checksum_status})." >&2
            exit "$checksum_status"
          fi

          capture_snapshot final
          if ! cmp -s \
            "$audit_root/initial-receipt.json" \
            "$audit_root/final-receipt.json"; then
            echo "::error::Release, asset, or exact-tag state changed during the read-only audit." >&2
            echo "initial receipt:" >&2
            sed 's/^/  /' "$audit_root/initial-receipt.json" >&2
            echo "final receipt:" >&2
            sed 's/^/  /' "$audit_root/final-receipt.json" >&2
            exit 1
          fi
          echo "Existing release integrity verified for ${RELEASE_TAG}; build and publication remain skipped."

  release-state-preflight:
    needs: get-version
    if: github.event_name != 'pull_request' && needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check for incomplete release state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.get-version.outputs.version }}
          RELEASE_PREFLIGHT_RETRY_DELAY_SECONDS: '1'
        run: |
          set -euo pipefail

          for required in gh python; do
            if ! command -v "$required" >/dev/null 2>&1; then
              echo "::error::Required release-preflight tool is unavailable: $required" >&2
              exit 1
            fi
          done
          if [[ -z "${GH_TOKEN:-}" || -z "${GITHUB_REPOSITORY:-}" || -z "${RELEASE_TAG:-}" ]]; then
            echo "::error::Release preflight is missing GH_TOKEN, GITHUB_REPOSITORY, or RELEASE_TAG." >&2
            exit 1
          fi

          release_pages="$(mktemp)"
          trap 'rm -f "$release_pages"' EXIT

          for attempt in 1 2 3; do
            api_status=0
            gh api --paginate --slurp \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              >"$release_pages" || api_status=$?
            if (( api_status != 0 )); then
              echo "::error::Authenticated release-state query failed for ${RELEASE_TAG} (gh exit ${api_status}); refusing to publish." >&2
              exit "$api_status"
            fi

            parse_status=0
            release_matches="$(python - "$release_pages" "$RELEASE_TAG" <<'PY'
          import json
          import sys

          path, exact_tag = sys.argv[1:]
          try:
              with open(path, encoding="utf-8") as handle:
                  pages = json.load(handle)
          except (OSError, json.JSONDecodeError) as error:
              print(f"Unable to parse release listing: {error}", file=sys.stderr)
              raise SystemExit(1)

          if not isinstance(pages, list):
              print("Release listing was not a JSON array of pages.", file=sys.stderr)
              raise SystemExit(1)

          for page_number, page in enumerate(pages, start=1):
              if not isinstance(page, list):
                  print(f"Release page {page_number} was not a JSON array.", file=sys.stderr)
                  raise SystemExit(1)
              for release in page:
                  if not isinstance(release, dict):
                      print(
                          f"Release page {page_number} contained a non-object entry.",
                          file=sys.stderr,
                      )
                      raise SystemExit(1)
                  tag_name = release.get("tag_name")
                  if not isinstance(tag_name, str) or not tag_name:
                      print(
                          f"Release page {page_number} contained an entry without "
                          "a non-empty string tag_name.",
                          file=sys.stderr,
                      )
                      raise SystemExit(1)
                  if tag_name != exact_tag:
                      continue

                  assets = release.get("assets")
                  asset_count = len(assets) if isinstance(assets, list) else "unknown"
                  print(
                      f"id={release.get('id')} draft={release.get('draft')} "
                      f"prerelease={release.get('prerelease')} assets={asset_count} "
                      f"url={release.get('html_url')}"
                  )
          PY
          )" || parse_status=$?
            if (( parse_status != 0 )); then
              echo "::error::Release-state response could not be validated; refusing to publish ${RELEASE_TAG}." >&2
              exit "$parse_status"
            fi
            if [[ -n "$release_matches" ]]; then
              echo "::error::Exact release state already exists for ${RELEASE_TAG} while its tag ref is absent. Refusing automatic reuse; inspect and clean it manually before rerunning." >&2
              printf '%s\n' "$release_matches" >&2
              exit 1
            fi
            if (( attempt < 3 )); then
              sleep "$RELEASE_PREFLIGHT_RETRY_DELAY_SECONDS"
            fi
          done

  build:
    needs: [get-version, release-state-preflight]
    if: ${{ !cancelled() && needs.get-version.result == 'success' && needs.get-version.outputs.tag_exists == 'false' && (github.event_name == 'pull_request' || needs.release-state-preflight.result == 'success') }}
    strategy:
      matrix:
        include:
          - os: windows-2025
            name: windows
            ext: .exe
            pyinstaller_mode: --onefile
            python_version: '3.12.10'
            python_architecture: x64
            constraint: constraints/requirements-windows-py312.txt
            pip_config_file: nul
            expected_platform: win32
            expected_machine: AMD64
          - os: macos-26
            name: macos
            ext: ""
            pyinstaller_mode: --onedir
            python_version: '3.12.10'
            python_architecture: arm64
            constraint: constraints/requirements-macos-py312.txt
            pip_config_file: /dev/null
            expected_platform: darwin
            expected_machine: arm64
          - os: ubuntu-24.04
            name: linux
            ext: ""
            pyinstaller_mode: --onefile
            python_version: '3.12.13'
            python_architecture: x64
            constraint: constraints/requirements-linux-py312.txt
            pip_config_file: /dev/null
            expected_platform: linux
            expected_machine: x86_64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      PIP_CONFIG_FILE: ${{ matrix.pip_config_file }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Linux GUI build and smoke dependencies
        if: matrix.name == 'linux'
        run: |
          package_manifest="packaging/linux/qt-xcb-runtime-packages.txt"
          mapfile -t qt_packages < <(
            sed -e '/^[[:space:]]*#/d' -e '/^[[:space:]]*$/d' "$package_manifest"
          )
          if [ "${#qt_packages[@]}" -ne 11 ]; then
            echo "::error::Expected exactly eleven reviewed Qt GUI/XCB runtime packages; found ${#qt_packages[@]}." >&2
            exit 1
          fi
          for package in "${qt_packages[@]}"; do
            if [[ ! "$package" =~ ^[a-z0-9][a-z0-9+.-]*$ ]]; then
              echo "::error::Invalid package name in $package_manifest: $package" >&2
              exit 1
            fi
          done
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            "${qt_packages[@]}" \
            xvfb

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python_version }}
          architecture: ${{ matrix.python_architecture }}

      - name: Install and verify dependencies
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            venv_dir="$(cygpath -u "$RUNNER_TEMP")/gm2godot-release-${{ matrix.name }}-venv"
            venv_bin="$venv_dir/Scripts"
            venv_native="$(cygpath -w "$venv_dir")"
            venv_path_native="$(cygpath -w "$venv_bin")"
            github_env_file="$(cygpath -u "$GITHUB_ENV")"
            github_path_file="$(cygpath -u "$GITHUB_PATH")"
          else
            venv_dir="$RUNNER_TEMP/gm2godot-release-${{ matrix.name }}-venv"
            venv_bin="$venv_dir/bin"
            venv_native="$venv_dir"
            venv_path_native="$venv_bin"
            github_env_file="$GITHUB_ENV"
            github_path_file="$GITHUB_PATH"
          fi
          if [ -e "$venv_dir" ] || [ -L "$venv_dir" ]; then
            echo "::error::Refusing to reuse dependency environment: $venv_dir" >&2
            exit 1
          fi
          python -m venv "$venv_dir"
          printf 'VIRTUAL_ENV=%s\n' "$venv_native" >> "$github_env_file"
          printf '%s\n' "$venv_path_native" >> "$github_path_file"
          export VIRTUAL_ENV="$venv_native"
          export PATH="$venv_bin:$PATH"
          hash -r
          python -c 'import os, pathlib, sys; raise SystemExit(0 if pathlib.Path(sys.prefix).resolve() == pathlib.Path(os.environ["VIRTUAL_ENV"]).resolve() else 1)'
          python -m pip --isolated --disable-pip-version-check --no-input install --no-cache-dir --only-binary=:all: \
            --constraint "${{ matrix.constraint }}" \
            pip==26.1.2
          python -m pip --isolated --disable-pip-version-check --no-input install --no-cache-dir --only-binary=:all: \
            --constraint "${{ matrix.constraint }}" \
            -r requirements.txt PyInstaller==6.21.0
          python scripts/verify_dependency_environment.py \
            --constraint "${{ matrix.constraint }}" \
            --mode subset \
            --require pip \
            --require Pillow \
            --require markdown2 \
            --require requests \
            --require PySide6 \
            --require PyInstaller \
            --expected-python "${{ matrix.python_version }}" \
            --expected-platform "${{ matrix.expected_platform }}" \
            --expected-machine "${{ matrix.expected_machine }}" \
            --expected-pip 26.1.2 \
            --output "$RUNNER_TEMP/release-${{ matrix.name }}-dependencies.json"

      - name: Build executable
        if: matrix.name != 'macos'
        run: |
          additional_hooks=()
          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          if [ "${{ matrix.name }}" = "linux" ]; then
            additional_hooks=(--additional-hooks-dir packaging/linux/hooks)
          fi
          pyinstaller_log="$RUNNER_TEMP/release-${{ matrix.name }}-pyinstaller.log"
          python -m PyInstaller ${{ matrix.pyinstaller_mode }} \
            --windowed \
            --clean \
            --name GM2Godot \
            --icon img/Logo.png \
            "${additional_hooks[@]}" \
            --hidden-import markdown2 \
            --hidden-import PIL \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --add-data "img${SEP}img" \
            --add-data "src${SEP}src" \
            --add-data "Languages${SEP}Languages" \
            --add-data "Current Language${SEP}." \
            main.py 2>&1 | tee "$pyinstaller_log"
          if [ "${{ matrix.name }}" = "linux" ]; then
            warning_status=0
            grep -Fq "WARNING: Library not found:" "$pyinstaller_log" || warning_status=$?
            if [ "$warning_status" -eq 0 ]; then
              echo "::error::The Linux PyInstaller analysis reported an unresolved shared library." >&2
              exit 1
            fi
            if [ "$warning_status" -ne 1 ]; then
              echo "::error::Unable to inspect the Linux PyInstaller warning log." >&2
              exit 1
            fi
          fi

      - name: Build macOS app bundle
        if: matrix.name == 'macos'
        run: python -m PyInstaller --clean packaging/macos/GM2Godot.spec

      - name: Verify Linux bundled Qt runtime
        if: matrix.name == 'linux'
        run: |
          inventory="$RUNNER_TEMP/release-linux-archive-inventory.txt"
          normalized_inventory="$RUNNER_TEMP/release-linux-archive-members.txt"
          pyi-archive_viewer --list --recursive --brief dist/GM2Godot > "$inventory"
          sed -n -e 's/^ //p' "$inventory" > "$normalized_inventory"
          for required in \
            PySide6/Qt/plugins/platforms/libqxcb.so \
            libxkbcommon-x11.so.0 \
            libxcb-cursor.so.0 \
            libxcb-icccm.so.4 \
            libxcb-image.so.0 \
            libxcb-keysyms.so.1 \
            libxcb-render-util.so.0 \
            libxcb-shape.so.0 \
            libxcb-util.so.1 \
            libxcb-xkb.so.1
          do
            member_status=0
            grep -Fxq -- "$required" "$normalized_inventory" || member_status=$?
            if [ "$member_status" -eq 1 ]; then
              echo "::error::The Linux one-file archive is missing required Qt/XCB member: $required" >&2
              exit 1
            fi
            if [ "$member_status" -ne 0 ]; then
              echo "::error::Unable to inspect the Linux one-file archive inventory." >&2
              exit 1
            fi
          done
          tiff_status=0
          grep -Fxq -- "PySide6/Qt/plugins/imageformats/libqtiff.so" \
            "$normalized_inventory" || tiff_status=$?
          if [ "$tiff_status" -eq 0 ]; then
            echo "::error::The unsupported Qt TIFF plugin remained in the Linux one-file archive." >&2
            exit 1
          fi
          if [ "$tiff_status" -ne 1 ]; then
            echo "::error::Unable to inspect the Linux one-file archive inventory." >&2
            exit 1
          fi

      - name: Package build
        run: |
          mkdir -p release
          if [ "${{ matrix.name }}" = "macos" ]; then
            cp -R dist/GM2Godot.app release/
          else
            cp dist/GM2Godot${{ matrix.ext }} release/
          fi
          cp README.md release/

      - name: Zip release
        run: |
          cd release
          7z a ../GM2Godot-${{ matrix.name }}.zip .

      - name: Verify packaged Linux GUI
        if: matrix.name == 'linux'
        run: |
          python -I scripts/verify_linux_gui_artifact.py \
            --archive "$GITHUB_WORKSPACE/GM2Godot-linux.zip"

      - name: Create macOS DMG
        if: matrix.name == 'macos'
        run: |
          rm -rf dmg
          mkdir -p dmg
          cp -R dist/GM2Godot.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create \
            -volname "GM2Godot" \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            GM2Godot-macos.dmg

      - name: Verify macOS bundle metadata
        if: matrix.name == 'macos'
        run: |
          /usr/bin/plutil -lint dist/GM2Godot.app/Contents/Info.plist
          python -I scripts/verify_macos_bundle_metadata.py \
            --source-root "$GITHUB_WORKSPACE" \
            --app "$GITHUB_WORKSPACE/dist/GM2Godot.app" \
            --zip "$GITHUB_WORKSPACE/GM2Godot-macos.zip" \
            --dmg "$GITHUB_WORKSPACE/GM2Godot-macos.dmg"

      - name: Upload artifact
        if: matrix.name != 'macos'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: GM2Godot-${{ matrix.name }}
          path: GM2Godot-${{ matrix.name }}.zip
          archive: true

      - name: Upload macOS artifacts
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: GM2Godot-${{ matrix.name }}
          path: |
            GM2Godot-${{ matrix.name }}.zip
            GM2Godot-${{ matrix.name }}.dmg
          archive: true

  release:
    needs: [get-version, release-state-preflight, build]
    if: ${{ !cancelled() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.get-version.result == 'success' && needs.get-version.outputs.tag_exists == 'false' && needs.release-state-preflight.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Download verified artifact archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: raw-artifacts
          skip-decompress: true
          digest-mismatch: error

      - name: Extract verified artifact archives
        shell: bash
        run: |
          set -euo pipefail
          if [[ -e artifacts || -L artifacts ]]; then
            echo "::error::Release extraction root already exists: artifacts" >&2
            exit 1
          fi
          for name in GM2Godot-windows GM2Godot-macos GM2Godot-linux; do
            archive="raw-artifacts/$name/$name.zip"
            if [[ ! -f "$archive" || -L "$archive" || ! -s "$archive" ]]; then
              echo "::error::Missing, non-regular, symlinked, or empty verified archive: $archive" >&2
              exit 1
            fi
          done

          python3 - <<'PY'
          from collections import Counter
          from pathlib import Path, PurePosixPath, PureWindowsPath
          import stat
          import struct
          import sys
          import zipfile

          local_header_struct = struct.Struct("<IHHHHHIIIHH")
          local_header_signature = 0x04034B50
          expected_by_artifact = {
              "GM2Godot-windows": ("GM2Godot-windows.zip",),
              "GM2Godot-macos": (
                  "GM2Godot-macos.zip",
                  "GM2Godot-macos.dmg",
              ),
              "GM2Godot-linux": ("GM2Godot-linux.zip",),
          }


          def fail(message: str) -> None:
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)


          for artifact_name, expected_members in expected_by_artifact.items():
              archive_path = (
                  Path("raw-artifacts")
                  / artifact_name
                  / f"{artifact_name}.zip"
              )
              try:
                  with zipfile.ZipFile(archive_path) as archive:
                      members = archive.infolist()
                      for member in members:
                          member_name = member.orig_filename
                          if member.extra:
                              fail(
                                  "Unsupported archive member metadata in "
                                  f"{archive_path}: {member_name!r} has "
                                  "ZIP extra fields"
                              )

                          posix_path = PurePosixPath(member_name)
                          windows_path = PureWindowsPath(member_name)
                          if (
                              member_name != member.filename
                              or not member_name
                              or "\\" in member_name
                              or posix_path.is_absolute()
                              or windows_path.is_absolute()
                              or bool(windows_path.drive)
                              or member_name != posix_path.name
                              or member_name in {".", ".."}
                          ):
                              fail(
                                  f"Unsafe archive member in {archive_path}: "
                                  f"{member_name!r}"
                              )

                          unix_mode = (member.external_attr >> 16) & 0xFFFF
                          if (
                              member.create_system != 3
                              or member.is_dir()
                              or bool(member.external_attr & 0x10)
                              or not stat.S_ISREG(unix_mode)
                          ):
                              fail(
                                  "Non-regular archive member in "
                                  f"{archive_path}: {member_name!r} "
                                  f"(create_system={member.create_system}, "
                                  f"mode={unix_mode:#o})"
                              )

                      actual_counts = Counter(
                          member.orig_filename for member in members
                      )
                      expected_counts = Counter(expected_members)
                      if actual_counts != expected_counts:
                          fail(
                              f"Unexpected archive members in {archive_path}: "
                              f"expected {list(expected_members)!r}, "
                              "found "
                              f"{[member.orig_filename for member in members]!r}"
                          )

                      for member in members:
                          archive_file = archive.fp
                          if archive_file is None:
                              fail(f"Verified archive closed unexpectedly: {archive_path}")
                          archive_file.seek(member.header_offset)
                          local_header = archive_file.read(local_header_struct.size)
                          if len(local_header) != local_header_struct.size:
                              fail(
                                  "Cannot read local member metadata in "
                                  f"{archive_path}: {member.orig_filename!r}"
                              )
                          local_fields = local_header_struct.unpack(local_header)
                          local_signature = local_fields[0]
                          local_flags = local_fields[2]
                          local_compression = local_fields[3]
                          local_name_length = local_fields[-2]
                          local_extra_length = local_fields[-1]
                          local_name = archive_file.read(local_name_length)
                          local_extra = archive_file.read(local_extra_length)
                          encoding = (
                              "utf-8" if member.flag_bits & 0x800 else "cp437"
                          )
                          expected_local_name = member.orig_filename.encode(encoding)
                          if (
                              local_signature != local_header_signature
                              or len(local_name) != local_name_length
                              or len(local_extra) != local_extra_length
                              or local_flags != member.flag_bits
                              or local_compression != member.compress_type
                              or local_name != expected_local_name
                          ):
                              fail(
                                  "Inconsistent local member metadata in "
                                  f"{archive_path}: {member.orig_filename!r}"
                              )
                          if local_extra:
                              fail(
                                  "Unsupported archive member metadata in "
                                  f"{archive_path}: {member.orig_filename!r} has "
                                  "local ZIP extra fields"
                              )
                          with archive.open(member):
                              pass
              except (
                  OSError,
                  RuntimeError,
                  UnicodeError,
                  NotImplementedError,
                  zipfile.BadZipFile,
              ) as error:
                  fail(
                      "Cannot read verified archive metadata for "
                      f"{archive_path}: {error}"
                  )
          PY

          mkdir -- artifacts
          for name in GM2Godot-windows GM2Godot-macos GM2Godot-linux; do
            destination="artifacts/$name"
            mkdir -- "$destination"
            if [[ ! -d "$destination" || -L "$destination" ]]; then
              echo "::error::Unsafe release extraction directory: $destination" >&2
              exit 1
            fi
          done

          for name in GM2Godot-windows GM2Godot-macos GM2Godot-linux; do
            archive="raw-artifacts/$name/$name.zip"
            unzip -q "$archive" -d "artifacts/$name"
          done

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C

          payloads=(
            "artifacts/GM2Godot-linux/GM2Godot-linux.zip"
            "artifacts/GM2Godot-macos/GM2Godot-macos.dmg"
            "artifacts/GM2Godot-macos/GM2Godot-macos.zip"
            "artifacts/GM2Godot-windows/GM2Godot-windows.zip"
          )
          if ! command -v sha256sum >/dev/null 2>&1; then
            echo "::error::Required checksum tool is unavailable: sha256sum" >&2
            exit 1
          fi
          for payload in "${payloads[@]}"; do
            if [[ ! -f "$payload" || -L "$payload" || ! -s "$payload" ]]; then
              echo "::error::Missing, non-regular, symlinked, or empty release payload: $payload" >&2
              exit 1
            fi
          done

          manifest_path="artifacts/SHA256SUMS"
          if [[ -e "$manifest_path" || -L "$manifest_path" ]]; then
            echo "::error::Checksum manifest path already exists: $manifest_path" >&2
            exit 1
          fi
          manifest_tmp="$(mktemp "artifacts/.SHA256SUMS.XXXXXX")"
          trap '[[ -z "$manifest_tmp" ]] || rm -f -- "$manifest_tmp"' EXIT
          for payload in "${payloads[@]}"; do
            digest_line="$(sha256sum -- "$payload")"
            digest="${digest_line%% *}"
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::sha256sum returned an invalid digest for $payload" >&2
              exit 1
            fi
            printf '%s  %s\n' "$digest" "${payload##*/}" >> "$manifest_tmp"
          done
          mv -- "$manifest_tmp" "$manifest_path"
          manifest_tmp=""
          trap - EXIT

      - name: Publish run-owned release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.get-version.outputs.version }}
          RELEASE_NAME: GM2Godot v${{ needs.get-version.outputs.version }}
          RELEASE_TARGET_SHA: ${{ github.sha }}
          RELEASE_RECEIPT_PATH: release-receipt/release-publisher.json
          RELEASE_PREFLIGHT_RETRY_DELAY_SECONDS: '1'
          RELEASE_OWNERSHIP_RETRY_DELAY_SECONDS: '1'
        run: python3 scripts/release_publisher.py

      - name: Preserve release ownership receipt
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-publisher-receipt-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-receipt/release-publisher.json
          archive: true
          if-no-files-found: ignore
          retention-days: 30
